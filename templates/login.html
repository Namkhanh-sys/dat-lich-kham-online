{% extends "layout.html" %}

{% block title %}Đăng Nhập - MedBooking{% endblock %}

{% block content %}
<div class="auth-container glass-panel">
    <div class="auth-header">
        <h2>Đăng Nhập</h2>
        <p>Truy cập tài khoản để quản lý lịch khám của bạn</p>
    </div>
    
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="email" class="form-label">Địa chỉ Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="example@gmail.com" required value="{{ request.form.get('email', '') }}">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Mật khẩu</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Đăng Nhập</button>
    </form>
    
    <div class="auth-footer">
        Chưa có tài khoản? <a href="{{ url_for('register') }}">Đăng ký ngay</a>
    </div>
</div>
{% endblock %}
