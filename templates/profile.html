{% extends "layout.html" %}

{% block title %}Hồ Sơ Cá Nhân - MedBooking{% endblock %}

{% block content %}
<div class="dashboard-grid">
    <!-- Sidebar -->
    <div class="sidebar glass-panel">
        <h3 style="margin-bottom: 1.5rem;">Xin chào, {{ session.get('user_name') }}</h3>
        <ul class="sidebar-menu">
            <li>
                <a href="{{ url_for('dashboard') }}" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
                    Lịch khám của tôi
                </a>
            </li>
            <li>
                <a href="{{ url_for('profile') }}" class="sidebar-link active">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
                    Thông tin tài khoản
                </a>
            </li>
            <li>
                <a href="{{ url_for('index') }}" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd"/></svg>
                    Đặt lịch khám mới
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Panel -->
    <div class="main-panel glass-panel">
        <div class="panel-header">
            <h2>Thông Tin Tài Khoản</h2>
        </div>

        <div style="display: grid; grid-template-columns: 1fr; gap: 2rem;">
            <!-- Update profile info -->
            <div class="glass-panel" style="padding: 1.5rem;">
                <h3 style="margin-bottom: 1.25rem; color: var(--secondary);">Cập Nhật Thông Tin Cá Nhân</h3>
                
                <form action="{{ url_for('profile_update') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label for="name" class="form-label">Họ và Tên</label>
                            <input type="text" id="name" name="name" class="form-control" required value="{{ user.name }}">
                        </div>
                        <div class="form-group">
                            <label for="phone" class="form-label">Số điện thoại</label>
                            <input type="tel" id="phone" name="phone" class="form-control" required value="{{ user.phone }}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">Địa chỉ Email (Không thể thay đổi)</label>
                        <input type="email" id="email" class="form-control" disabled value="{{ user.email }}" style="opacity: 0.6; cursor: not-allowed;">
                    </div>
                    
                    <div style="display: flex; justify-content: flex-end;">
                        <button type="submit" class="btn btn-primary">Lưu Thay Đổi</button>
                    </div>
                </form>
            </div>

            <!-- Change password -->
            <div class="glass-panel" style="padding: 1.5rem;">
                <h3 style="margin-bottom: 1.25rem; color: var(--danger);">Đổi Mật Khẩu</h3>
                
                <form action="{{ url_for('change_password') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="form-group">
                        <label for="old_password" class="form-label">Mật khẩu hiện tại</label>
                        <input type="password" id="old_password" name="old_password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label for="new_password" class="form-label">Mật khẩu mới</label>
                            <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Tối thiểu 6 ký tự" minlength="6" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm_password" class="form-label">Xác nhận mật khẩu mới</label>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu mới" minlength="6" required>
                        </div>
                    </div>
                    
                    <div style="display: flex; justify-content: flex-end;">
                        <button type="submit" class="btn btn-danger">Đổi Mật Khẩu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
